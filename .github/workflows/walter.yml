name: '🚀 دان/لود، فشرده‌سازی و ذخیره در مخزن'

on:
  workflow_dispatch:
    inputs:
      file_urls:
        description: '🔗 لینک مستقیم فایل‌ها (با کاما جدا کنید)'
        required: true
        type: string
      custom_dir_name:
        description: '📁 نام دلخواه برای پوشه اصلی (اختیاری)'
        required: false
        type: string
        default: ''
      custom_filename:
        description: '📄 نام دلخواه برای فایل نهایی (بدون پسوند، اختیاری)'
        required: false
        type: string
        default: ''
      description_text:
        description: '📝 توضیحات برای فایل README (اختیاری)'
        required: false
        type: string
        default: 'فایل دان/لود شده'
      password:
        description: '🔐 رمز فایل فشرده (اختیاری - فقط برای فایل‌های غیر رسانه‌ای)'
        required: false
        type: string
        default: ''
      split_size_mb:
        description: '📦 حجم هر تکه به مگابایت (حداکثر 95، پیش‌فرض: 95) - فقط برای فایل‌های غیر رسانه‌ای بالای 100 مگابایت'
        required: false
        type: number
        default: 95
      compression_level:
        description: '🎯 سطح فشرده‌سازی 7z (1=سریع، 9=حداکثر) - فقط برای فایل‌های غیر رسانه‌ای'
        required: false
        type: number
        default: 9
      mp3_bitrate:
        description: '🎵 بیت‌ریت MP3 (320k, 192k, 128k, 64k - پیش‌فرض: بدون تغییر)'
        required: false
        type: string
        default: 'none'
      cookies:
        description: '🍪 کوکی برای لینک‌های محافظت شده (اختیاری)'
        required: false
        type: string
        default: ''
      user_agent:
        description: '🌐 User-Agent دلخواه (اختیاری)'
        required: false
        type: string
        default: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'

permissions:
  contents: write

jobs:
  download-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: دریافت کد مخزن
        uses: actions/checkout@v4.2.2

      - name: نصب ابزارها
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            p7zip-full \
            ffmpeg \
            jq \
            curl \
            file \
            coreutils \
            python3

      - name: تنظیم متغیرهای امن
        id: sanitize
        run: |
          # پالایش URLها
          echo "${{ github.event.inputs.file_urls }}" | tr ',' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | while read url; do
            if [[ ! "$url" =~ ^https?:// ]]; then
              echo "❌ خطا: لینک نامعتبر: $url"
              exit 1
            fi
          done
          
          # نام پوشه
          if [ -z "${{ github.event.inputs.custom_dir_name }}" ]; then
            SAFE_DIR_NAME="downloaded_$(date +'%Y%m%d_%H%M%S')"
          else
            SAFE_DIR_NAME=$(echo "${{ github.event.inputs.custom_dir_name }}" | sed 's/[\\/:*?"<>|]/_/g' | sed 's/ //g')
          fi
          echo "safe_dir_name=$SAFE_DIR_NAME" >> $GITHUB_OUTPUT
          
          # نام فایل
          if [ -n "${{ github.event.inputs.custom_filename }}" ]; then
            SAFE_FILENAME=$(echo "${{ github.event.inputs.custom_filename }}" | sed 's/[\\/:*?"<>|]/_/g' | sed 's/ //g')
          else
            SAFE_FILENAME=""
          fi
          echo "safe_filename=$SAFE_FILENAME" >> $GITHUB_OUTPUT
          
          # اعتبارسنجی حجم تکه‌ها
          SPLIT_SIZE=${{ github.event.inputs.split_size_mb }}
          if [ $SPLIT_SIZE -gt 95 ] || [ $SPLIT_SIZE -lt 1 ]; then
            echo "❌ حجم تکه باید بین 1 تا 95 مگابایت باشد"
            exit 1
          fi
          echo "split_size=${SPLIT_SIZE}m" >> $GITHUB_OUTPUT
          
          # اعتبارسنجی بیت‌ریت MP3
          MP3_BITRATE="${{ github.event.inputs.mp3_bitrate }}"
          if [[ "$MP3_BITRATE" != "none" && "$MP3_BITRATE" != "320k" && "$MP3_BITRATE" != "192k" && "$MP3_BITRATE" != "128k" && "$MP3_BITRATE" != "64k" ]]; then
            echo "❌ بیت‌ریت نامعتبر: $MP3_BITRATE"
            exit 1
          fi
          echo "mp3_bitrate=$MP3_BITRATE" >> $GITHUB_OUTPUT

      - name: پردازش و دان/لود فایل‌ها
        id: process
        run: |
          FINAL_DIR="${{ steps.sanitize.outputs.safe_dir_name }}"
          mkdir -p "$FINAL_DIR"
          
          echo "${{ github.event.inputs.file_urls }}" | tr ',' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | sed '/^$/d' > /tmp/urls.txt
          
          TOTAL_URLS=$(wc -l < /tmp/urls.txt)
          CURRENT=0
          
          if [ -n "${{ github.event.inputs.cookies }}" ]; then
            echo "${{ github.event.inputs.cookies }}" | sed 's/; /\n/g' > /tmp/cookies.txt
            COOKIE_OPT="--cookie /tmp/cookies.txt"
          else
            COOKIE_OPT=""
          fi
          
          while IFS= read -r URL || [ -n "$URL" ]; do
            [ -z "$URL" ] && continue
            CURRENT=$((CURRENT + 1))
            
            echo "========================================="
            echo "📥 [$CURRENT/$TOTAL_URLS] شروع دان/لود"
            
            # استخراج نام فایل
            ORIGINAL_FILENAME=$(basename "$URL" | sed 's/\?.*//' | python3 -c "import sys; from urllib.parse import unquote; print(unquote(sys.stdin.read()))" 2>/dev/null || basename "$URL" | sed 's/\?.*//')
            
            if [ -z "$ORIGINAL_FILENAME" ]; then
              ORIGINAL_FILENAME="downloaded_file_$(date +%s)"
            fi
            
            # نام نهایی فایل
            if [ -n "${{ steps.sanitize.outputs.safe_filename }}" ]; then
              EXT="${ORIGINAL_FILENAME##*.}"
              if [ "$EXT" != "$ORIGINAL_FILENAME" ]; then
                FINAL_NAME="${{ steps.sanitize.outputs.safe_filename }}.$EXT"
              else
                FINAL_NAME="${{ steps.sanitize.outputs.safe_filename }}"
              fi
            else
              FINAL_NAME="$ORIGINAL_FILENAME"
            fi
            
            export LANG=fa_IR.UTF-8
            export LC_ALL=fa_IR.UTF-8
            
            echo "نام فایل: $FINAL_NAME"
            
            # دان/لود فایل
            curl -L --fail --retry 5 --retry-delay 3 --retry-max-time 60 \
              --progress-bar \
              --user-agent "${{ github.event.inputs.user_agent }}" \
              $COOKIE_OPT \
              --output "$FINAL_NAME" \
              "$URL"
            
            if [ $? -ne 0 ]; then
              echo "❌ خطا در دان/لود → ادامه به لینک بعدی"
              continue
            fi
            
            FILE_SIZE=$(stat -c%s "$FINAL_NAME" 2>/dev/null || stat -f%z "$FINAL_NAME" 2>/dev/null)
            FILE_SIZE_MB=$((FILE_SIZE / 1024 / 1024))
            echo "✅ دریافت شد: $FINAL_NAME ($FILE_SIZE_MB MB)"
            
            MIME=$(file -b --mime-type "$FINAL_NAME")
            EXT="${FINAL_NAME##*.}"
            EXT=$(echo "$EXT" | tr '[:upper:]' '[:lower:]')
            
            # تشخیص نوع فایل
            IS_MEDIA=false
            IS_MP3=false
            
            if [[ "$EXT" == "mp3" || "$MIME" == "audio/mpeg" ]]; then
              IS_MEDIA=true
              IS_MP3=true
              echo "🎵 فایل MP3 شناسایی شد"
            elif [[ "$EXT" =~ ^(mp4|mkv|avi|mov|wmv|flv|webm)$ || "$MIME" == video/* ]]; then
              IS_MEDIA=true
              echo "🎬 فایل ویدیویی شناسایی شد"
            elif [[ "$EXT" =~ ^(jpg|jpeg|png|gif|bmp|webp|svg)$ || "$MIME" == image/* ]]; then
              IS_MEDIA=true
              echo "🖼️ فایل تصویری شناسایی شد"
            elif [[ "$EXT" =~ ^(aac|wav|ogg|flac|m4a)$ || "$MIME" == audio/* ]]; then
              IS_MEDIA=true
              echo "🎵 فایل صوتی شناسایی شد"
            fi
            
            # پردازش فایل
            PROCESSED_FILE="$FINAL_NAME"
            
            # 1. تبدیل MP3 با ffmpeg (اگر انتخاب شده باشد)
            if [ "$IS_MP3" = true ]; then
              MP3_BITRATE="${{ steps.sanitize.outputs.mp3_bitrate }}"
              if [ "$MP3_BITRATE" != "none" ]; then
                echo "🎵 تبدیل MP3 به بیت‌ریت $MP3_BITRATE..."
                TEMP_MP3="temp_${FINAL_NAME}"
                ffmpeg -i "$FINAL_NAME" -b:a "$MP3_BITRATE" -c:a libmp3lame -y "$TEMP_MP3" 2>/dev/null
                if [ $? -eq 0 ]; then
                  NEW_SIZE=$(stat -c%s "$TEMP_MP3" 2>/dev/null || stat -f%z "$TEMP_MP3" 2>/dev/null)
                  NEW_SIZE_MB=$((NEW_SIZE / 1024 / 1024))
                  echo "✅ تبدیل شد: $FILE_SIZE_MB MB → $NEW_SIZE_MB MB"
                  rm -f "$FINAL_NAME"
                  mv "$TEMP_MP3" "$FINAL_NAME"
                  PROCESSED_FILE="$FINAL_NAME"
                else
                  echo "⚠️ خطا در تبدیل، ادامه با فایل اصلی"
                fi
              fi
            fi
            
            # 2. تصمیم‌گیری برای فشرده‌سازی با 7z
            if [ "$IS_MEDIA" = true ]; then
              # فایل‌های رسانه‌ای: بدون فشرده‌سازی 7z
              echo "📁 فایل رسانه‌ای → ذخیره بدون فشرده‌سازی"
              
              TARGET_NAME="$FINAL_NAME"
              COUNTER=1
              while [ -f "$FINAL_DIR/$TARGET_NAME" ]; do
                BASE="${FINAL_NAME%.*}"
                EXT="${FINAL_NAME##*.}"
                TARGET_NAME="${BASE}_${COUNTER}.${EXT}"
                COUNTER=$((COUNTER + 1))
              done
              
              cp "$PROCESSED_FILE" "$FINAL_DIR/$TARGET_NAME"
              echo "✅ ذخیره شد: $TARGET_NAME"
            else
              # فایل‌های غیر رسانه‌ای: فشرده‌سازی با 7z
              echo "🗜️ فایل غیر رسانه‌ای → فشرده‌سازی با 7z"
              
              ARCHIVE_NAME="${FINAL_NAME}.7z"
              COUNTER=1
              while [ -f "$FINAL_DIR/$ARCHIVE_NAME" ]; do
                BASE="${FINAL_NAME%.*}"
                ARCHIVE_NAME="${BASE}_${COUNTER}.7z"
                COUNTER=$((COUNTER + 1))
              done
              
              if [ $FILE_SIZE -lt 104857600 ]; then
                if [ -n "${{ github.event.inputs.password }}" ]; then
                  7z a -t7z -mx=${{ github.event.inputs.compression_level }} -mhe=on -p"${{ github.event.inputs.password }}" "$FINAL_DIR/$ARCHIVE_NAME" "./$PROCESSED_FILE" > /dev/null 2>&1
                else
                  7z a -t7z -mx=${{ github.event.inputs.compression_level }} "$FINAL_DIR/$ARCHIVE_NAME" "./$PROCESSED_FILE" > /dev/null 2>&1
                fi
              else
                if [ -n "${{ github.event.inputs.password }}" ]; then
                  7z a -t7z -mx=${{ github.event.inputs.compression_level }} -mhe=on -p"${{ github.event.inputs.password }}" -v${{ steps.sanitize.outputs.split_size }} "$FINAL_DIR/$ARCHIVE_NAME" "./$PROCESSED_FILE" > /dev/null 2>&1
                else
                  7z a -t7z -mx=${{ github.event.inputs.compression_level }} -v${{ steps.sanitize.outputs.split_size }} "$FINAL_DIR/$ARCHIVE_NAME" "./$PROCESSED_FILE" > /dev/null 2>&1
                fi
              fi
              
              if [ $? -eq 0 ]; then
                echo "✅ فشرده‌سازی کامل شد: $ARCHIVE_NAME"
              else
                echo "⚠️ خطا در فشرده‌سازی، ذخیره فایل اصلی"
                cp "$PROCESSED_FILE" "$FINAL_DIR/$FINAL_NAME"
              fi
            fi
            
            rm -f "$FINAL_NAME" "$PROCESSED_FILE" 2>/dev/null
            
          done < /tmp/urls.txt
          
          echo "final_dir=$FINAL_DIR" >> $GITHUB_OUTPUT

      - name: ساخت README
        run: |
          FINAL_DIR="${{ steps.process.outputs.final_dir }}"
          
          if [ ! -d "$FINAL_DIR" ]; then
            echo "❌ خطا: پوشه $FINAL_DIR وجود ندارد"
            exit 1
          fi
          
          CURRENT_DATE=$(date +'%Y-%m-%d %H:%M:%S')
          MP3_BITRATE="${{ steps.sanitize.outputs.mp3_bitrate }}"
          PASSWORD_SET="${{ github.event.inputs.password }}"
          DESCRIPTION="${{ github.event.inputs.description_text }}"
          
          # ساخت فایل README با روش echo
          echo "# 📦 فایل‌های دان/لود شده" > "$FINAL_DIR/README.md"
          echo "" >> "$FINAL_DIR/README.md"
          echo "**${DESCRIPTION}**" >> "$FINAL_DIR/README.md"
          echo "" >> "$FINAL_DIR/README.md"
          echo "## ℹ️ اطلاعات" >> "$FINAL_DIR/README.md"
          echo "" >> "$FINAL_DIR/README.md"
          echo "- **تاریخ دان/لود:** ${CURRENT_DATE}" >> "$FINAL_DIR/README.md"
          echo "- **سطح فشرده‌سازی 7z:** ${{ github.event.inputs.compression_level }}" >> "$FINAL_DIR/README.md"
          
          if [ "$MP3_BITRATE" != "none" ]; then
            echo "- **بیت‌ریت MP3:** ${MP3_BITRATE}" >> "$FINAL_DIR/README.md"
          fi
          
          if [ -n "$PASSWORD_SET" ]; then
            echo "- **رمزگذاری:** فعال (فقط برای فایل‌های غیر رسانه‌ای)" >> "$FINAL_DIR/README.md"
          else
            echo "- **رمزگذاری:** غیرفعال" >> "$FINAL_DIR/README.md"
          fi
          
          echo "" >> "$FINAL_DIR/README.md"
          echo "## 📂 نحوه استفاده" >> "$FINAL_DIR/README.md"
          echo "" >> "$FINAL_DIR/README.md"
          echo "1. فایل‌ها را دان/لود کنید" >> "$FINAL_DIR/README.md"
          echo "2. فایل‌های با پسوند .7z را با 7-Zip استخراج کنید" >> "$FINAL_DIR/README.md"
          echo "3. فایل‌های رسانه‌ای (MP3، MP4، تصاویر) بدون نیاز به استخراج قابل استفاده هستند" >> "$FINAL_DIR/README.md"
          echo "" >> "$FINAL_DIR/README.md"
          echo "---" >> "$FINAL_DIR/README.md"
          echo "*تولید شده توسط GitHub Actions*" >> "$FINAL_DIR/README.md"
          
          # بررسی ایجاد فایل
          if [ -f "$FINAL_DIR/README.md" ]; then
            echo "✅ README ساخته شد در $FINAL_DIR/README.md"
            cat "$FINAL_DIR/README.md"
          else
            echo "❌ خطا: README ساخته نشد"
            exit 1
          fi

      - name: کامیت و انتشار
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add "${{ steps.process.outputs.final_dir }}/"
          git commit -m "Add files" || echo "Nothing to commit"
          
          git push --force-with-lease origin main || git push --force-with-lease origin master
          
          echo "✅ انتشار یافت"

      - name: گزارش نهایی
        run: |
          echo "========================================="
          echo "✅ فرآیند دان/لود کامل شد!"
          echo "========================================="
          echo "📁 پوشه: ${{ steps.process.outputs.final_dir }}"
          echo "📊 حجم: $(du -sh ${{ steps.process.outputs.final_dir }} | cut -f1)"
          echo "🔢 تعداد فایل‌ها: $(find ${{ steps.process.outputs.final_dir }} -type f | wc -l)"
          echo "========================================="
